<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог</title>
    <style>
        body {
            margin: 0px;
            padding: 0px;
        }
        header {
            background-color: #333;
            padding-top: 10px;
            padding-bottom: 20px;
        }
        .search_line {
            display: flex;
            justify-content: center;
        }
        .search_form {
            margin: auto 20px;
        }
        .search {
            margin: 0px;
        }
        ul {
            list-style-type: none;
            display: contents;
        }
        li {
            margin: 0px 40px;
        }
        li a {
            color: #fff;
            text-decoration: none;
            border: 1px solid #fff;
            border-radius: 25px;
            padding: 4px 10px;
            transition: all 0.2s ease;
        }
        li a:hover {
            background-color: #fff;
            color: #000;
        }
        h1 {
            display: flex;
            justify-content: center;
        }
        section {
            display: flex;
            justify-content: center;
        }
        article {
            width: 250px;
            margin: 5px;
            border: 1px solid #333;
            padding: 10px;
        }
        .lots {
            width: 250px;
            display: flex;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 10px;
        }
        .lot_price {
            padding: 0px 5px;
            border: 2px solid #0f0;
            border-radius: 10px;
        }
        .push_to_basket {
            margin-left: auto;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 0px 5px;
            transition: all 0.2s ease;
            
        }
        .lot_basket {
            text-decoration: none;
            color: #000;
        }
        .price_basket {
            display: flex;
            margin-bottom: 5px;
        }
        .push_to_basket:hover {
            background-color: #0f0;
        }
    </style>
</head>
<body>
    <header>
        <div class="search_line">
            <img src="./tasks/src/task_4/logo.png" alt="Logo" width="100">
            <form class="search_form">
                <input type="search" size="80" class="search">
                <button type="submit" class="search">🔍︎</button>
            </form>
            <img src="./tasks/src/task_4/logo.png" alt="Logo" width="100">
        </div>
        <div class="search_line">
            <ul>
                <li>
                    <a href="./task_4.html">Главная</a>
                </li>
                <li>
                    <a href="">Каталог</a>
                </li>
                <li>
                    <a href="">О нас</a>
                </li>
                <li>
                    <a href="">Контакты</a>
                </li>
                <li>
                    <a href="">Корзина</a>
                </li>
            </ul>
        </div>
    </header>
    <main>
        <h1>Каталог</h1>
        
    </main>
    <footer>

    </footer>
</body>
</html>
